name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Xcode バージョンをハードコードせず、利用可能な最新の Xcode 16 系を選ぶ。
          # （このプロジェクトは Xcode 16 の file system synchronized group を使うため 16 以降が必須）
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Shiritori.xcodeproj \
            -scheme Shiritori \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
